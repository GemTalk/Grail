name: build-ci-image

# Builds the Grail CI base image (Ubuntu 22.04 + Python 3.14 + C toolchain +
# the GemStone product) and publishes it to this repo's GitHub Container
# Registry as ci-base.
#
# MANUAL: run it from the Actions tab (a) once before the CI workflow can run,
# and (b) whenever tests/github/Dockerfile changes or you move GemStone version.
#
# The GemStone product it bundles is already a public download from GemTalk, so
# the ci-base package can be PUBLIC (free GHCR storage regardless of plan) or
# private -- the CI workflow pulls it either way.  Cost is otherwise just the
# infrequent build minutes; pulls into CI are free.

on:
  workflow_dispatch:
    inputs:
      gs_version:
        description: "GemStone version to bake in (must be publicly downloadable)"
        default: "3.7.5"
        required: false

permissions:
  contents: read
  packages: write   # push to GHCR via the built-in GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # GHCR rejects uppercase; the owner/repo slug may contain capitals.
      - name: Compute image ref (lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/ci-base" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/github/Dockerfile
          push: true
          build-args: |
            GS_VERSION=${{ github.event.inputs.gs_version || '3.7.5' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.inputs.gs_version || '3.7.5' }}
