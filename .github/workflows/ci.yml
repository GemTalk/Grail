name: CI

# Installs Grail and runs its SUnit gate against a fresh GemStone stone.
#
# The `test` job runs inside the prebuilt ci-base image (Ubuntu 22.04 + Python
# 3.14 + C toolchain + the GemStone product), published by the build-ci-image
# workflow to this repo's GitHub Container Registry.  Because the product is
# baked into the image, the job neither downloads nor unzips it -- it just lays
# down a fresh extent and runs install.sh + scripts/run_tests.sh.
#
# `test` is a MATRIX that splits the SUnit shards across parallel runners (each
# does its own ~10s install against its own extent and runs HALF the shards),
# so the dominant shard phase roughly halves.  This is the authoritative
# pass/fail gate.  The heavier CPython conformance scoreboard (~20-30 min on CI)
# is too slow for the per-push path and lives in .github/workflows/
# cpython-conformance.yml (nightly + on-demand).
#
# Run build-ci-image ONCE before this workflow can run (the container pull needs
# ci-base:latest to exist).

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read    # pull ci-base from GHCR (harmless if the package is public)

jobs:
  # Compute the lowercase GHCR image ref. GHCR rejects uppercase and the
  # owner/repo slug may contain capitals; a job output is the only place a
  # computed value can reach `container.image`.
  image:
    runs-on: ubuntu-22.04
    outputs:
      ref: ${{ steps.n.outputs.ref }}
    steps:
      - id: n
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}/ci-base:latest" >> "$GITHUB_OUTPUT"

  test:
    needs: image
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      # Don't let one shard group's failure cancel the other -- we want both.
      fail-fast: false
      matrix:
        # Split the 4 SUnit shards across 2 parallel runners (2 each).  The
        # partition COUNT stays 4 (GRAIL_TEST_WORKERS default), so the stable
        # class->shard mapping is unchanged; only which shards a runner executes
        # differs.  `name` gives collision-free artifact names (matrix.shards
        # contains a space).
        include:
          - { name: a, shards: "0 1" }
          - { name: b, shards: "2 3" }
    # Runs inside ci-base. --shm-size lifts the container's default 64 MB
    # /dev/shm so GemStone's shared page cache fits. GEMSTONE/PATH come from the
    # image ENV.
    container:
      image: ${{ needs.image.outputs.ref }}
      options: --shm-size=1g
      # Works whether ci-base is public or private; drop this block if you make
      # it public and prefer a credential-free pull.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # NetLDI guest mode (-g) is disallowed when NetLDI runs as root, and a
      # GitHub container job runs as root.  Keep the job root (GitHub needs it
      # for the workspace mount + JS actions) but run ALL GemStone work as the
      # non-root 'ci' user baked into the image.  Hand it the checked-out tree
      # first (checkout wrote it as root).  Everything runs in one shell, so no
      # $GITHUB_ENV hand-off is needed (and ci can't write those root files, so
      # they're dropped with `env -u`).
      - name: install + run SUnit shards ${{ matrix.shards }} (as non-root 'ci')
        run: |
          chown -R ci:ci "$GITHUB_WORKSPACE"
          runuser -u ci -- env -u GITHUB_ENV -u GITHUB_PATH \
            HOME=/home/ci \
            GEMSTONE=/opt/gemstone/product \
            GEMSTONE_NAME=gs64stone \
            GRAIL_NETLDI=gs64ldi \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            GRAIL_TEST_SHARDS="${{ matrix.shards }}" \
            bash -ex -c '
              export PATH="$GEMSTONE/bin:$PATH"
              export GEMSTONE_GLOBAL_DIR="$GITHUB_WORKSPACE/testing"
              tests/github/setup-testing-env.sh
              cd "$GEMSTONE_GLOBAL_DIR"
              startstone -e stone.conf gs64stone
              waitstone gs64stone 60
              startnetldi -g gs64ldi
              cd "$GITHUB_WORKSPACE"
              ./install_base.sh
              ./install.sh
              ./scripts/run_tests.sh
            '

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Per-group name: matrix jobs must not collide on artifact names.
          name: grail-ci-logs-shards-${{ matrix.name }}
          if-no-files-found: ignore
          retention-days: 7
          # .out logs + stone/gem logs; the extent is deliberately excluded.
          path: |
            *.out
            out/*.out
            testing/*.log
            testing/log/**
