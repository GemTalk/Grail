# GitLab CI pipeline for Grail
#
# Pattern follows gemstone/.gitlab/ci/templates.yml `.testing` template:
#   - run inside the QA Ubuntu image
#   - source tests/gitlab/setup-testing-env.sh to download the GemStone product
#     and provision a fresh stone in $CI_PROJECT_DIR/testing
#   - start the stone, then run Grail's install.sh and run_tests.sh from the
#     project root
#
# Required CI/CD variables (Settings -> CI/CD -> Variables):
#   GEMSTONE_PROJECT_ID  - GitLab project ID of the gemstone repo whose
#                          package registry hosts the product zips. The
#                          gemstone project must allow this project in its
#                          job-token allowlist (Settings -> CI/CD -> Token
#                          Access).
#
# Defaults (override per-pipeline if needed):
#   GS_VERSION  - GemStone product version to download

variables:
  GS_VERSION: "3.7.6"

stages:
  - test

test:
  stage: test
  image: container.gemtalksystems.com/gemstone/containers/qa/ubuntu:22.04
  before_script:
    # The QA Ubuntu 22.04 image ships only Python 3.10 and no C toolchain.
    # Grail needs `make`/`cc` to build the CPython shim, and Python >= 3.14
    # for the embedded-CPython FFI (PyInitConfig from PEP 741).  3.13 has
    # Py_GetConstantBorrowed but lacks PyInitConfig_Create, so init fails
    # at first call with "undefined symbol".  Long-term these should be
    # baked into the image.
    - sudo apt-get update
    - sudo apt-get install -y --no-install-recommends build-essential software-properties-common gnupg
    - sudo add-apt-repository -y ppa:deadsnakes/ppa
    - sudo apt-get install -y --no-install-recommends python3.14 python3.14-dev
    - sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.14 1
    - sudo update-alternatives --install /usr/bin/python3-config python3-config /usr/bin/python3.14-config 1
    - source $CI_PROJECT_DIR/tests/gitlab/setup-testing-env.sh
    - cd "$CI_PROJECT_DIR/testing"
    - startstone -e stone.conf gs64stone
    - waitstone gs64stone 60
    - cd "$CI_PROJECT_DIR"
  script:
    - python3 --version # 3.14.x
    - ./install.sh
    - ./scripts/run_tests.sh
  after_script:
    # $GEMSTONE/$PATH are not preserved into after_script; re-derive from the
    # downloaded product tree if it exists.
    - |
      if [ -d "$CI_PROJECT_DIR/product" ]; then
        export GEMSTONE="$CI_PROJECT_DIR/product"
        export PATH="$GEMSTONE/bin:$PATH"
        stopstone -i gs64stone DataCurator swordfish || true
      fi
  artifacts:
    when: always
    paths:
      - install.out
      - runTests.out
      - runCPythonTests.gs.out
      - testing/
    expire_in: 1 week
